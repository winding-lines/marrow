name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    uses: ./.github/workflows/test.yml

  release:
    needs: test
    runs-on: ubuntu-latest
    env:
      MODULAR_HOME: "/home/runner/.modular"
    steps:
    - name: Checkout repo
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - uses: prefix-dev/setup-pixi@v0.8.8
      with:
        cache: true
    - name: Build mojopkg
      run: pixi run package
    - name: Compute version
      id: version
      run: |
        LAST_TAG=$(git describe --tags --match "v*" --abbrev=0 2>/dev/null || echo "v0.0.0")
        BASE_VERSION="${LAST_TAG#v}"
        SHORT_SHA=$(git rev-parse --short=6 HEAD)
        if [ "$(git rev-list -n1 "${LAST_TAG}")" = "$(git rev-parse HEAD)" ]; then
          VERSION="${BASE_VERSION}"
        else
          VERSION="${BASE_VERSION}-${SHORT_SHA}"
        fi
        echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
    - name: Build conda package
      run: |
        VERSION="${{ steps.version.outputs.version }}"
        sed -i "/^context:/,/^[^ ]/{s/^  version: .*/  version: \"${VERSION}\"/}" recipe/recipe.yaml
        pixi run -e package package-conda
    - name: Upload to prefix.dev
      run: pixi run -e package rattler-build upload prefix -c marrow output/*/marrow-*.conda
      env:
        PREFIX_API_KEY: ${{ secrets.PREFIX_API_TOKEN }}
    - name: Create GitHub release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          package/marrow.mojopkg
          output/*/marrow-*.conda
        generate_release_notes: true
