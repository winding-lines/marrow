name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    uses: ./.github/workflows/test.yml

  release:
    needs: test
    runs-on: ubuntu-latest
    env:
      MODULAR_HOME: "/home/runner/.modular"
    steps:
    - name: Checkout repo
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - uses: prefix-dev/setup-pixi@v0.9.4
      with:
        cache: true
        frozen: true
    - uses: actions/cache@v5
      with:
        path: .pixi/envs/default/**/.mojo_cache
        key: mojo-cache-default-${{ runner.os }}-${{ hashFiles('pixi.lock', '**/*.mojo') }}
        restore-keys: mojo-cache-default-${{ runner.os }}-
    - name: Build mojopkg
      run: pixi run package
    - name: Build conda package
      run: |
        # Build the Conda package using pixi-build-mojo
        pixi build
    - name: Upload to prefix.dev
      run: |
        pixi auth login prefix.dev --token "$PREFIX_API_KEY"
        pixi run publish
      env:
        PREFIX_API_KEY: ${{ secrets.PREFIX_API_TOKEN }}
    - name: Create GitHub release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          package/marrow.mojopkg
          marrow-*.conda
        generate_release_notes: true
