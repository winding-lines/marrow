name: Benchmarks

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bench-linux-x86_64:
    name: bench (linux, x86_64)
    runs-on: ubuntu-latest
    env:
      MODULAR_HOME: "/home/runner/.modular"
      FORCE_COLOR: "1"
      PYTEST_ADDOPTS: "--color=yes"
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: prefix-dev/setup-pixi@v0.9.4
        with:
          frozen: true
          cache: true
          cache-write: ${{ github.event_name == 'push' && github.ref_name == 'main' }}

      - uses: actions/cache@v5
        with:
          path: .pixi/envs/bench/**/.mojo_cache
          key: mojo-cache-bench-${{ runner.os }}-${{ hashFiles('pixi.lock', '**/*.mojo') }}
          restore-keys: mojo-cache-bench-${{ runner.os }}-

      - name: Checkout gh-pages
        if: github.ref == 'refs/heads/main'
        uses: actions/checkout@v6
        with:
          ref: gh-pages
          path: gh-pages-out

      - name: Run benchmarks (PR)
        if: github.ref != 'refs/heads/main'
        run: >
          pixi run -e bench pytest --benchmark -v --no-gpu

      - name: Run benchmarks
        if: github.ref == 'refs/heads/main'
        run: >
          pixi run -e bench pytest --benchmark -v --no-gpu
          --save-benchmarks results
          --benchmark-history gh-pages-out/benchmarks/data.json

      - name: Prepare dashboard
        if: github.ref == 'refs/heads/main'
        run: |
          COMMIT="$(git rev-parse HEAD)"
          mkdir -p gh-pages-out/results gh-pages-out/benchmarks
          cp results/${COMMIT}.json gh-pages-out/results/${COMMIT}.json
          cp benchmarks/index.html gh-pages-out/benchmarks/index.html

      - uses: peaceiris/actions-gh-pages@v4
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./gh-pages-out
          keep_files: true
