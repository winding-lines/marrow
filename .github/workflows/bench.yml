name: Benchmarks

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write
  pull-requests: write

jobs:
  bench-mojo:
    runs-on: ubuntu-latest
    env:
      MODULAR_HOME: "/home/runner/.modular"
      FORCE_COLOR: "1"
      PYTEST_ADDOPTS: "--color=yes"
    steps:
      - uses: actions/checkout@v4
      - uses: prefix-dev/setup-pixi@v0.9.4
        with:
          cache: true
          cache-write: ${{ github.event_name == 'push' && github.ref_name == 'main' }}
          frozen: true
      - name: Run Mojo benchmarks
        run: pixi run pytest --benchmark --mojo -v --benchmark-json .benchmarks/mojo_results.json
      - name: Store benchmark results
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Mojo Kernel Benchmarks
          tool: pytest
          output-file-path: .benchmarks/mojo_results.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          comment-on-alert: true
          alert-threshold: "130%"
          fail-on-alert: false
          benchmark-data-dir-path: dev/bench
