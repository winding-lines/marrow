name: Tests

on:
  push:
    branches:
      - main
  pull_request:
  workflow_call:

jobs:
  test-linux-x86_64:
    name: test (linux, x86_64)
    runs-on: ubuntu-latest
    env:
      MODULAR_HOME: "/home/runner/.modular"
      FORCE_COLOR: "1"
      PYTEST_ADDOPTS: "--color=yes"
    steps:
    - name: Checkout repo
      uses: actions/checkout@v6
    - uses: prefix-dev/setup-pixi@v0.9.4
      with:
        cache: true
        cache-write: ${{ github.event_name == 'push' && github.ref_name == 'main' }}
        frozen: true
        environments: dev
    - uses: actions/cache@v5
      with:
        path: .pixi/envs/dev/**/.mojo_cache
        key: mojo-cache-dev-${{ runner.os }}-${{ hashFiles('pixi.lock', '**/*.mojo') }}
        restore-keys: mojo-cache-dev-${{ runner.os }}-
    - name: tests
      run: |
        pixi run -e dev test_parallel --no-gpu
        pixi run package

  test-macos-arm64:
    name: test (macos, arm64)
    runs-on: macos-latest
    env:
      MODULAR_HOME: "/Users/runner/.modular"
      FORCE_COLOR: "1"
      PYTEST_ADDOPTS: "--color=yes"
    steps:
    - name: Checkout repo
      uses: actions/checkout@v6
    - uses: prefix-dev/setup-pixi@v0.9.4
      with:
        cache: true
        cache-write: ${{ github.event_name == 'push' && github.ref_name == 'main' }}
        frozen: true
        environments: dev
    - uses: actions/cache@v5
      with:
        path: .pixi/envs/dev/**/.mojo_cache
        key: mojo-cache-dev-${{ runner.os }}-${{ hashFiles('pixi.lock', '**/*.mojo') }}
        restore-keys: mojo-cache-dev-${{ runner.os }}-
    - name: tests
      run: |
        pixi run -e dev test_parallel --no-gpu
        pixi run package

  # TODO: re-enable once x86_64 ASAN compilation is fast enough
  asan-linux-x86_64:
    name: asan (linux, x86_64)
    if: false
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      MODULAR_HOME: "/home/runner/.modular"
      FORCE_COLOR: "1"
      PYTEST_ADDOPTS: "--color=yes"
    steps:
    - name: Checkout repo
      uses: actions/checkout@v6
    - uses: prefix-dev/setup-pixi@v0.9.4
      with:
        cache: true
        cache-write: ${{ github.event_name == 'push' && github.ref_name == 'main' }}
        frozen: true
        environments: asan
    - uses: actions/cache@v5
      with:
        path: .pixi/envs/asan/**/.mojo_cache
        key: mojo-cache-asan-${{ runner.os }}-${{ hashFiles('pixi.lock', '**/*.mojo') }}
        restore-keys: mojo-cache-asan-${{ runner.os }}-
    - name: asan tests
      run: pixi run -e asan test_mojo_asan_parallel --no-gpu --no-python

  asan-macos-arm64:
    name: asan (macos, arm64)
    runs-on: macos-latest
    timeout-minutes: 30
    env:
      MODULAR_HOME: "/Users/runner/.modular"
      FORCE_COLOR: "1"
      PYTEST_ADDOPTS: "--color=yes"
    steps:
    - name: Checkout repo
      uses: actions/checkout@v6
    - uses: prefix-dev/setup-pixi@v0.9.4
      with:
        cache: true
        cache-write: ${{ github.event_name == 'push' && github.ref_name == 'main' }}
        frozen: true
        environments: asan
    - uses: actions/cache@v5
      with:
        path: .pixi/envs/asan/**/.mojo_cache
        key: mojo-cache-asan-${{ runner.os }}-${{ hashFiles('pixi.lock', '**/*.mojo') }}
        restore-keys: mojo-cache-asan-${{ runner.os }}-
    - name: asan tests
      run: pixi run -e asan test_mojo_asan_parallel --no-gpu --no-python
