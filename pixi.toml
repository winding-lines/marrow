[workspace]
authors = ["Krisztian Szucs <szucs.krisztian@gmail.com>"]
channels = [
  "https://prefix.dev/mojo-community",
  "https://conda.modular.com/max-nightly/",
  "conda-forge",
  "https://prefix.dev/pixi-build-backends"
]
platforms = ["osx-arm64", "linux-64"]
preview = ["pixi-build"]

[package]
name = "marrow"
version = "0.1.0"

[package.build]
backend = { name = "pixi-build-mojo", version = "0.1.*" }

[package.build-dependencies]
mojo-compiler = "==0.26.3.0.dev2026041520"

[package.host-dependencies]
mojo = "==0.26.3.0.dev2026041520"

[package.run-dependencies]
mojo = "==0.26.3.0.dev2026041520"
pontoneer = "==0.6.6.dev2026041520"
# Mojo nightly builds are compiled against a specific CPython minor version;
# update the minor bound together with mojo/pontoneer when upgrading.
python = ">=3.14,<3.15"

[tasks]
build_python = { cmd = "mojo build -I . python/lib.mojo --emit shared-lib -o python/marrow.so" }
profile = "python scripts/profile.py"
package = "mkdir -p package && mojo package marrow -o package/marrow.mojopkg"
publish = { cmd = "find . -name 'marrow-*.conda' | xargs pixi upload https://prefix.dev/api/v1/upload/mojo-community" }

# Dev — dependencies and tasks for development and testing.
[feature.dev.dependencies]
pytest = ">=9.0.2,<10"
pytest-benchmark = ">=5.2.3,<6"
pytest-xdist = ">=3,<4"

[feature.dev.pypi-dependencies]
# PyPI wheel is used instead of conda-forge: the conda-forge libarrow bundles
# libopentelemetry-cpp whose RuntimeContextStorage singleton destructor crashes
# at process exit on macOS, corrupting stdout and causing all tests in the
# same binary to be reported as failed.  The PyPI wheel ships a
# self-contained libarrow built without the OpenTelemetry SDK.
pyarrow = ">=23.0.1,<24"

[feature.dev.tasks]
test_mojo = { cmd = "pytest --mojo -v" }
test_mojo_parallel = { cmd = "pytest --mojo -v -n auto --dist=loadfile" }
test_python = { cmd = "pytest --python -v" }
test_gpu = { cmd = "pytest --gpu -v" }
test = { cmd = "pytest -v" }
test_parallel = { cmd = "pytest -v -n auto --dist=loadfile" }

# Asan — ASAN runtime needed for --asan test runs.
[feature.asan.dependencies]
libcompiler-rt = ">=17,<23"

[feature.asan.tasks]
test_mojo_asan = { cmd = "pytest --mojo --asan -v" }
test_mojo_asan_parallel = { cmd = "pytest --mojo --asan -v -n auto --dist=loadfile" }

# Bench — benchmark dependencies and tasks (polars/duckdb for comparison benches).
[feature.bench.dependencies]
polars = ">=1.39.2,<2"
rich = ">=13,<15"
duckdb = ">=1.5.1,<2"

[feature.bench.tasks]
bench_mojo = { cmd = "pytest --benchmark --mojo -v" }
bench_python = { cmd = "pytest --benchmark --python -v" }
bench = { cmd = "pytest --benchmark -v" }

# Format — code formatting and linting.
[feature.format.dependencies]
ruff = ">=0.14.14,<0.15"

[feature.format.tasks]
fmt_mojo = { cmd = "mojo format marrow python" }
fmt_python = { cmd = "ruff format python" }
fmt = { depends-on = ["fmt_mojo", "fmt_python"] }
fmt_check = { cmd = "git diff --exit-code", depends-on = ["fmt"] }

# Docs — documentation generation.
[feature.docs.dependencies]
ipython = ">=9.11.0,<10"
jupyter = ">=1.1,<2"
jupyter-cache = ">=1.0,<2"
quarto = ">=1.6,<2"

[feature.docs.tasks]
docs = { cmd = "quarto render docs/", depends-on = ["build_python"], env = { PYTHONPATH = "python" } }
docs_preview = { cmd = "quarto preview docs/", depends-on = ["build_python"], env = { PYTHONPATH = "python" } }

# Examples — optional runnable examples.
# Run with: pixi run -e examples datafusion_udf
[feature.examples.pypi-dependencies]
datafusion = ">=44.0.0"

[feature.examples.tasks]
datafusion_udf = { cmd = "python examples/datafusion/main.py", depends-on = ["build_python"], env = { PYTHONPATH = "python" } }

[environments]
default = { features = ["dev", "format"], solve-group = "default" }
dev = { features = ["dev", "format"], solve-group = "default" }
asan = { features = ["dev", "asan"], solve-group = "default" }
bench = { features = ["dev", "bench"], solve-group = "default" }
format = { features = ["format"], solve-group = "default" }
docs = { features = ["docs"], solve-group = "default" }
examples = { features = ["examples"], solve-group = "default" }

[dependencies]
mojo = ">=0.26.3.0.dev2026041520,<0.27"
pontoneer = ">=0.6.6.dev2026041520,<0.7"
# Mojo nightly builds are compiled against a specific CPython minor version;
# update the minor bound together with mojo/pontoneer when upgrading.
python = ">=3.14,<3.15"
# The mojo-community channel ships a zlib 0.1.0 stub that satisfies no real
# version constraint; pin to the real conda-forge zlib so that pyarrow's
# libopentelemetry-cpp → prometheus-cpp → zlib chain can resolve on linux-64.
zlib = ">=1.3.1"

